<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vienna Eats</title>
<style>
  :root { --bg:#faf8f5; --card:#fff; --ink:#1c1a17; --muted:#6b655c; --accent:#c2410c; --line:#e8e2d9; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Georgia',serif; background:var(--bg); color:var(--ink); }
  header { padding:24px 20px 12px; border-bottom:1px solid var(--line); }
  h1 { margin:0; font-size:24px; letter-spacing:-.3px; }
  header p { margin:4px 0 0; color:var(--muted); font-size:14px; font-family:system-ui,sans-serif; }
  #chat { max-width:720px; margin:0 auto; padding:20px; }
  .msg { margin:14px 0; line-height:1.5; }
  .user { text-align:right; }
  .user span { background:var(--accent); color:#fff; padding:10px 14px; border-radius:14px 14px 2px 14px; display:inline-block; font-family:system-ui,sans-serif; font-size:15px; }
  .bot span { background:var(--card); border:1px solid var(--line); padding:12px 16px; border-radius:14px 14px 14px 2px; display:inline-block; white-space:pre-wrap; font-size:15px; max-width:90%; }
  .bot a { color:var(--accent); }
  #bar { position:sticky; bottom:0; background:var(--bg); padding:14px 20px; border-top:1px solid var(--line); }
  #form { max-width:720px; margin:0 auto; display:flex; gap:8px; }
  #q { flex:1; padding:12px 14px; border:1px solid var(--line); border-radius:10px; font-size:15px; font-family:system-ui,sans-serif; }
  #send { padding:12px 20px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-size:15px; cursor:pointer; }
  #send:disabled { opacity:.5; }
  .hint { color:var(--muted); font-size:13px; font-family:system-ui,sans-serif; margin-top:6px; }
</style>
</head>
<body>
<header>
  <h1>Vienna Eats</h1>
  <p>Ask for food by taste, cuisine, price, or area. "spicy halal under €15 near me", "best hotpot", "Georgian wine bar".</p>
</header>
<div id="chat">
  <div class="msg bot"><span>Hi! Tell me what you feel like eating and where in Vienna.</span></div>
</div>
<div id="bar">
  <div id="form">
    <input id="q" placeholder="e.g. best spicy halal food under €15" autocomplete="off">
    <button id="send">Ask</button>
  </div>
  <div class="hint" id="hint"></div>
</div>
<script>
  // Point this at your Render URL once deployed. Empty = same origin.
  const API = "";
  const chat = document.getElementById("chat");
  const q = document.getElementById("q");
  const send = document.getElementById("send");

  function add(role, text) {
    const d = document.createElement("div");
    d.className = "msg " + role;
    const s = document.createElement("span");
    // linkify maps URLs
    s.innerHTML = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">map</a>');
    d.appendChild(s);
    chat.appendChild(d);
    window.scrollTo(0, document.body.scrollHeight);
  }

  async function ask() {
    const text = q.value.trim();
    if (!text) return;
    add("user", text);
    q.value = "";
    send.disabled = true;
    add("bot", "Looking…");
    const placeholder = chat.lastChild;
    try {
      const r = await fetch(API + "/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });
      const data = await r.json();
      placeholder.querySelector("span").innerHTML =
        data.answer.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">map</a>');
    } catch (e) {
      placeholder.querySelector("span").textContent = "Something went wrong. Is the server running?";
    }
    send.disabled = false;
    q.focus();
  }

  send.onclick = ask;
  q.addEventListener("keydown", e => { if (e.key === "Enter") ask(); });
</script>
</body>
</html>
