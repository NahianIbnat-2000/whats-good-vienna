<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What's Good Vienna? — AI Restaurant Finder</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background:#0f172a; color:#e2e8f0; height:100vh; overflow:hidden; }

  .app { display:flex; height:100vh; }

  /* SIDEBAR */
  .sidebar { width:460px; min-width:460px; background:#1e293b; display:flex; flex-direction:column; border-right:1px solid #334155; position:relative; z-index:20; overflow:hidden; }
  .sidebar-header { padding:20px; background:linear-gradient(135deg,#dc2626 0%,#991b1b 100%); color:white; position:relative; }
  .sidebar-header h1 { font-size:1.3rem; font-weight:800; margin-bottom:4px; }
  .sidebar-header p { font-size:0.8rem; opacity:0.85; }
  .sidebar-header .stats { display:flex; gap:14px; margin-top:10px; font-size:0.72rem; opacity:0.9; }

  /* Category bar */
  .category-bar { display:flex; gap:6px; padding:8px 14px; background:#0f172a; border-bottom:1px solid #334155; overflow-x:auto; scrollbar-width:none; }
  .category-bar::-webkit-scrollbar { display:none; }
  .category-bar button { padding:5px 12px; border:1px solid #334155; border-radius:16px; background:#1e293b; color:#94a3b8; font-size:0.72rem; cursor:pointer; white-space:nowrap; transition:all 0.2s; font-family:inherit; }
  .category-bar button:hover { border-color:#dc2626; color:#dc2626; }
  .category-bar button.on { background:#dc2626; color:white; border-color:#dc2626; }

  /* Quick filters */
  .quick-filters { display:flex; gap:6px; padding:8px 14px; overflow-x:auto; background:#0f172a; border-bottom:1px solid #334155; scrollbar-width:none; }
  .quick-filters::-webkit-scrollbar { display:none; }
  .quick-filters button { padding:5px 12px; border:1px solid #334155; border-radius:16px; background:#1e293b; color:#94a3b8; font-size:0.75rem; cursor:pointer; white-space:nowrap; transition:all 0.2s; font-family:inherit; }
  .quick-filters button:hover { border-color:#dc2626; color:#dc2626; background:#fef2f2; }

  /* Chat area */
  .chat-area { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:12px; }
  .chat-area::-webkit-scrollbar { width:6px; }
  .chat-area::-webkit-scrollbar-thumb { background:#334155; border-radius:3px; }

  .message { max-width:92%; padding:12px 16px; border-radius:16px; font-size:0.88rem; line-height:1.6; animation:fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .message.user { align-self:flex-end; background:#dc2626; color:white; border-bottom-right-radius:4px; font-weight:500; }
  .message.bot { align-self:flex-start; background:#334155; color:#e2e8f0; border-bottom-left-radius:4px; }
  .message.bot .filter-badges { display:flex; flex-wrap:wrap; gap:5px; margin-top:10px; padding-top:10px; border-top:1px solid #475569; }
  .message.bot .filter-badges span { font-size:0.7rem; padding:2px 8px; border-radius:10px; background:#0f172a; color:#94a3b8; }
  .message.bot .filter-badges span.highlight { background:#dc2626; color:white; }

  /* Restaurant cards */
  .restaurant-card { background:#1e293b; border:1px solid #334155; border-radius:12px; padding:14px; margin-top:8px; cursor:pointer; transition:all 0.2s; position:relative; }
  .restaurant-card:hover { border-color:#dc2626; transform:translateY(-1px); box-shadow:0 6px 18px rgba(220,38,38,0.12); }
  .restaurant-card.active { border-color:#dc2626; background:#2a1a1a; }
  .card-header { display:flex; justify-content:space-between; align-items:start; margin-bottom:8px; }
  .card-header h3 { font-size:1rem; font-weight:700; color:#f8fafc; }
  .rating { display:flex; align-items:center; gap:4px; font-size:0.82rem; color:#fbbf24; font-weight:700; background:rgba(251,191,36,0.1); padding:2px 8px; border-radius:12px; }
  .meta-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; align-items:center; }
  .meta-row span { font-size:0.72rem; padding:2px 8px; border-radius:12px; background:#0f172a; color:#94a3b8; }
  .pill-cuisine { background:#1e3a5f !important; color:#60a5fa !important; }
  .pill-price { background:#1e3a2f !important; color:#4ade80 !important; }
  .pill-dist { background:#3f1e3a !important; color:#f472b6 !important; }
  .pill-taste { background:#3f2e1a !important; color:#fbbf24 !important; }
  .pill-diet { background:#1e3a2f !important; color:#4ade80 !important; }
  .pill-vibe { background:#2e1a3f !important; color:#a78bfa !important; }
  .pill-use { background:#1a2e3f !important; color:#38bdf8 !important; }
  .explanation { font-size:0.82rem; color:#cbd5e1; line-height:1.5; }
  .details { margin-top:10px; padding-top:10px; border-top:1px solid #334155; font-size:0.75rem; color:#94a3b8; display:grid; grid-template-columns:1fr 1fr; gap:4px; }
  .details a { color:#f87171; text-decoration:none; font-weight:500; }
  .match-score { position:absolute; top:6px; right:6px; font-size:0.62rem; font-weight:700; color:#dc2626; background:rgba(220,38,38,0.1); padding:2px 6px; border-radius:8px; opacity:0.7; }

  /* Input */
  .input-area { padding:14px 18px; border-top:1px solid #334155; background:#1e293b; }
  .input-wrapper { display:flex; gap:8px; align-items:center; }
  .input-wrapper input { flex:1; padding:12px 16px; border:2px solid #334155; border-radius:24px; font-size:0.88rem; outline:none; transition:all 0.2s; background:#0f172a; color:#e2e8f0; font-family:inherit; }
  .input-wrapper input:focus { border-color:#dc2626; box-shadow:0 0 0 3px rgba(220,38,38,0.12); }
  .input-wrapper input::placeholder { color:#64748b; }
  .input-wrapper button { padding:12px 20px; background:#dc2626; color:white; border:none; border-radius:24px; font-weight:700; cursor:pointer; transition:all 0.2s; font-family:inherit; }
  .input-wrapper button:hover { background:#b91c1c; }
  .input-wrapper button:disabled { background:#475569; cursor:not-allowed; }

  /* Welcome */
  .welcome { text-align:center; padding:40px 20px; color:#94a3b8; }
  .welcome h2 { font-size:1.2rem; color:#f8fafc; margin-bottom:8px; font-weight:700; }
  .welcome p { font-size:0.82rem; line-height:1.6; max-width:300px; margin:0 auto 16px; }
  .welcome .examples { display:flex; flex-direction:column; gap:6px; max-width:320px; margin:0 auto; }
  .welcome .examples button { background:#1e293b; border:1px solid #334155; padding:8px 14px; border-radius:20px; font-size:0.78rem; color:#cbd5e1; cursor:pointer; transition:all 0.2s; text-align:left; font-family:inherit; display:flex; align-items:center; gap:6px; }
  .welcome .examples button:hover { background:#dc2626; color:white; border-color:#dc2626; transform:translateX(3px); }

  /* Loading */
  .loading { display:flex; align-items:center; gap:8px; color:#94a3b8; font-size:0.82rem; }
  .loading-dots { display:flex; gap:4px; }
  .loading-dots span { width:7px; height:7px; background:#dc2626; border-radius:50%; animation:bounce 1.4s infinite ease-in-out; }
  .loading-dots span:nth-child(2) { animation-delay:0.2s; }
  .loading-dots span:nth-child(3) { animation-delay:0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }

  /* Map */
  .map-wrap { flex:1; position:relative; min-width:0; background:#1e293b; }
  #map { height:100%; width:100%; }

  /* Responsive */
  @media (max-width:900px) { .app { flex-direction:column; } .sidebar { width:100%; min-width:auto; height:55vh; } .map-wrap { height:45vh; } }
</style>
</head>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>What's Good Vienna?</h1>
      <p>Find what's actually good — by taste, mood, and use case</p>
      <div class="stats">
        <span>🍴 68 restaurants</span>

    <div class="category-bar" id="categoryBar"></div>

    <div class="chat-area" id="chatArea"></div>

    <div class="input-area">
      <div class="input-wrapper">
        <input type="text" id="chatInput" placeholder="e.g., spicy Indian curry under €15" />
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <div class="map-wrap">
    <div id="map"></div>
  </div>
</div>

// ===== UTILS =====
function haversine(lat1, lon1, lat2, lon2) {
  const R=6371, p1=lat1*Math.PI/180, p2=lat2*Math.PI/180;
  const dp=(lat2-lat1)*Math.PI/180, dl=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
  return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function parseQuery(query) {
  const q=query.toLowerCase();
  const f={cuisine:null, taste_tags:[], food_type:[], diet:[], vibe:[], use_case:[], max_price:null, min_price:null};

  const cuisineMap={
    "Indian":["indian","curry","biryani","masala","tandoori"],
    "Vietnamese":["vietnamese","pho","banh mi","bun"],
    "Chinese":["chinese","dim sum","dumpling","sichuan","peking duck","hot pot"],
    "Thai":["thai","pad thai","tom yum"],
    "Japanese":["japanese","sushi","ramen","tempura"],
    "Korean":["korean","bibimbap","kbbq","korean bbq"],
    "Turkish":["turkish","kebab","kebap","döner"],
    "Lebanese":["lebanese","falafel","hummus","shawarma"],
    "Israeli":["israeli"],"Persian":["persian","iranian"],
    "French":["french","croissant","baguette"],
    "Austrian":["austrian","schnitzel","tafelspitz"],
    "Italian":["italian","pizza","pasta","risotto"],
    "Mexican":["mexican","taco","burrito","nachos"],
    "Burger":["burger","hamburger"],
    "Seafood":["seafood","fish","shrimp"],
    "Vegetarian":["vegetarian","vegan","plant-based"],
    "Cafe":["cafe","coffee","espresso","cappuccino"],
    "Ice Cream":["ice cream","gelato"],
    "International":["international","fusion"]
  };
  for(const[c,kws] of Object.entries(cuisineMap)){for(const kw of kws)if(q.includes(kw)){f.cuisine=c;break;}if(f.cuisine)break;}

  const tasteMap={
    "spicy":["spicy","scharf","hot","chili","pepper","fire"],
    "mild":["mild","not spicy","gentle","light"],
    "sweet":["sweet","dessert","cake","pastry","chocolate"],
    "sour":["sour","sauer","tangy","citrus","lemon"],
    "umami":["umami","savory","rich"],
    "creamy":["creamy","smooth","buttery"],
    "fried":["fried","crispy","crunchy"],
    "soup":["soup","broth","pho","ramen"],
    "curry":["curry","masala","biryani"]
  };
  for(const[t,kws] of Object.entries(tasteMap)){for(const kw of kws)if(q.includes(kw)){if(!f.taste_tags.includes(t))f.taste_tags.push(t);break;}}

  const foodMap={
    "rice":["rice","reis","pilaf","biryani"],
    "noodles":["noodles","nudeln","pasta","ramen","pho","pad thai"],
    "soup":["soup","suppe","broth","pho","ramen","tom yum"],
    "curry":["curry","masala"],
    "dessert":["dessert","sweet","cake","ice cream","pastry"],
    "naan":["naan","bread","roti"]
  };
  for(const[ft,kws] of Object.entries(foodMap)){for(const kw of kws)if(q.includes(kw)){if(!f.food_type.includes(ft))f.food_type.push(ft);break;}}

  const dietMap={"halal":["halal","muslim"],"vegetarian":["vegetarian","veggie","meat-free"],"vegan":["vegan","plant-based","dairy-free"]};
  for(const[d,kws] of Object.entries(dietMap)){for(const kw of kws)if(q.includes(kw)){if(!f.diet.includes(d))f.diet.push(d);break;}}

  const vibeMap={
    "cafe":["cafe","coffee","cozy","warm"],
    "casual":["casual","relaxed","easy"],
    "romantic":["romantic","date","intimate","candlelight"],
    "family":["family","kid-friendly","children","kids"],
    "cheap eats":["cheap","budget","affordable"]
  };
  for(const[v,kws] of Object.entries(vibeMap)){for(const kw of kws)if(q.includes(kw)){if(!f.vibe.includes(v))f.vibe.push(v);break;}}

  const useMap={
    "date":["date","romantic","anniversary","special occasion"],
    "study cafe":["study","work","laptop","wifi","quiet","cozy","read"],
    "quick lunch":["quick lunch","lunch","fast","work lunch","business lunch"],
    "family":["family","kid-friendly","children","group"],
    "cheap eats":["cheap eats","budget","affordable","student"],
    "takeaway":["takeaway","take-out","to-go","delivery"],
    "late-night":["late-night","late night","open late","midnight"]
  };
  for(const[u,kws] of Object.entries(useMap)){for(const kw of kws)if(q.includes(kw)){if(!f.use_case.includes(u))f.use_case.push(u);break;}}

  if(q.includes("under €15")||q.includes("cheap")||q.includes("budget")||q.includes("student"))f.max_price="€";
  else if(q.includes("under €25")||q.includes("moderate")||q.includes("mid-range"))f.max_price="€€";
  else if(q.includes("expensive")||q.includes("fancy")||q.includes("fine dining"))f.min_price="€€€";
  if(q.includes("€€€"))f.min_price="€€€";
  else if(q.includes("€€")&&!q.includes("€€€")){f.max_price="€€";f.min_price="€€";}
  else if(q.includes("€")&&!q.includes("€€"))f.max_price="€";

  return f;
}

function scoreRestaurant(r, filters, userLat, userLon) {
  let score=0; const reasons=[];
  const dist=haversine(userLat,userLon,r.lat,r.lon);
  score += Math.max(0,1-(dist/5))*15;

  if(filters.cuisine&&filters.cuisine.toLowerCase()===r.cuisine.toLowerCase()){score+=25;reasons.push("Cuisine: "+r.cuisine);}

  const tasteM=filters.taste_tags.filter(t=>r.taste_tags.includes(t));
  if(tasteM.length){score+=tasteM.length*12;reasons.push("Taste: "+tasteM.join(", "));}

  const foodM=filters.food_type.filter(ft=>r.food_type.includes(ft));
  if(foodM.length){score+=foodM.length*10;reasons.push("Food: "+foodM.join(", "));}

  const dietM=filters.diet.filter(d=>r.diet.includes(d));
  if(dietM.length){score+=dietM.length*15;reasons.push("Diet: "+dietM.join(", "));}

  const vibeM=filters.vibe.filter(v=>r.vibe.includes(v));
  if(vibeM.length){score+=vibeM.length*8;reasons.push("Vibe: "+vibeM.join(", "));}

  const useM=filters.use_case.filter(u=>r.use_case.includes(u));
  if(useM.length){score+=useM.length*10;reasons.push("For: "+useM.join(", "));}

  if(filters.max_price){if(PRICE_MAP[r.price_level]<=PRICE_MAP[filters.max_price]){score+=10;reasons.push("Budget: "+r.price_level);}else score-=25;}
  if(filters.min_price){if(PRICE_MAP[r.price_level]>=PRICE_MAP[filters.min_price]){score+=10;reasons.push("Price: "+r.price_level);}else score-=15;}

  score+=(r.rating-3.0)*6; if(r.rating>=4.3)reasons.push("Top rated ("+r.rating+"/5)");
  score+=Math.min(r.review_count/400,6);

  if(!filters.cuisine&&!filters.taste_tags.length&&!filters.food_type.length&&!filters.diet.length&&!filters.vibe.length&&!filters.use_case.length&&!filters.max_price)
    score+=r.rating*6+Math.max(0,1-(dist/5))*12;

  return {score,dist,reasons};
}

function generateExplanation(r, filters, dist) {
  const parts=[];
  if(filters.cuisine&&r.cuisine.toLowerCase()===filters.cuisine.toLowerCase())
    parts.push("A top-rated "+r.cuisine+" spot");
  else
    parts.push("A well-loved "+r.cuisine+" restaurant");

  if(dist<0.5)parts.push("just a short walk away");
  else if(dist<1.5)parts.push("about "+dist.toFixed(1)+" km from you");
  else parts.push(dist.toFixed(1)+" km away");

  const features=[];
  if(r.taste_tags.includes("spicy"))features.push("known for bold, spicy flavors");
  if(r.taste_tags.includes("curry"))features.push("famous for rich curries");
  if(r.taste_tags.includes("soup"))features.push("hearty soups");
  if(r.taste_tags.includes("sweet"))features.push("amazing sweet treats");
  if(r.diet.includes("halal"))features.push("halal-certified");
  if(r.diet.includes("vegan"))features.push("fully vegan menu");
  if(r.diet.includes("vegetarian"))features.push("great vegetarian options");
  if(r.vibe.includes("cafe"))features.push("perfect cafe atmosphere");
  if(r.vibe.includes("romantic"))features.push("romantic ambiance");
  if(r.vibe.includes("family"))features.push("family-friendly");
  if(r.use_case.includes("study cafe"))features.push("quiet and study-friendly");
  if(r.use_case.includes("date"))features.push("ideal for dates");
  if(r.use_case.includes("late-night"))features.push("open late");
  if(r.use_case.includes("takeaway"))features.push("quick takeaway");

  if(features.length)parts.push("— "+features.join(", "));
  parts.push("Rated "+r.rating+"/5 with "+r.review_count+" reviews. Price: "+r.price_level+".");
  return parts.join(" ");
}

function processQuery(query, userLat, userLon) {
  const filters=parseQuery(query);
  const scored=RESTAURANTS.map(r=>{
    const {score,dist,reasons}=scoreRestaurant(r,filters,userLat,userLon);
    return {...r,score,dist,reasons,explanation:generateExplanation(r,filters,dist)};
  }).sort((a,b)=>b.score-a.score);
  const top=scored.filter(s=>s.score>0).slice(0,5);
  return {results:top,filters,total:scored.filter(s=>s.score>0).length};
}

  "Vietnamese pho for quick lunch",
  "Chinese hot pot for family dinner",
  "quiet study cafe with sweet desserts",
  "halal kebab takeaway open late",
  "romantic Italian date night under €25"
];

const categories=[
  {label:"🌶️ Spicy",filter:"spicy"},
  {label:"🥗 Vegetarian",filter:"vegetarian"},
  {label:"☕ Cafe",filter:"cafe"},
  {label:"🍜 Noodles",filter:"noodles"},
  {label:"🍛 Curry",filter:"curry"},
  {label:"🍰 Sweet",filter:"sweet"},
  {label:"🌙 Late Night",filter:"late-night"},
  {label:"💕 Date",filter:"date"},
  {label:"💰 Cheap",filter:"cheap eats"},
  {label:"📚 Study",filter:"study cafe"},
];

// Init map
function initMap() {
  mapInstance=L.map('map').setView([userLocation.lat,userLocation.lon],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
  }).addTo(mapInstance);
  L.circleMarker([userLocation.lat,userLocation.lon],{radius:8,fillColor:'#dc2626',color:'#fff',weight:2,fillOpacity:1})
    .addTo(mapInstance).bindPopup("You are here");
}

function updateMap() {
  Object.values(markers).forEach(m=>mapInstance.removeLayer(m));
  markers={};

  lastResults.forEach(r=>{
    const isActive=r.id===activeId;
    const marker=L.circleMarker([r.lat,r.lon],{
      radius:isActive?10:6, fillColor:isActive?'#dc2626':'#64748b',
      color:'#fff', weight:2, fillOpacity:0.9
    }).addTo(mapInstance);
    marker.bindPopup('<strong>'+r.name+'</strong><br>'+r.cuisine+' | '+r.price_level+' | ★ '+r.rating);
    markers[r.id]=marker;
  });

  if(lastResults.length>0){
    const group=new L.featureGroup(Object.values(markers));
    mapInstance.fitBounds(group.getBounds().pad(0.1));
  }
}

function createCard(r, isActive) {
  const div=document.createElement('div');
  div.className='restaurant-card'+(isActive?' active':'');
  div.innerHTML=`
    <div class="match-score">Match: ${Math.round(r.score)}</div>
    <div class="card-header">
      <h3>${r.name}</h3>
      <div class="rating">★ ${r.rating}</div>
    </div>
    <div class="meta-row">
      <span class="pill-cuisine">${r.cuisine}</span>
      <span class="pill-price">${r.price_level}</span>
      <span class="pill-dist">📍 ${r.dist.toFixed(1)} km</span>
      ${r.taste_tags.slice(0,2).map(t=>'<span class="pill-taste">'+t+'</span>').join('')}
      ${r.diet.slice(0,1).map(d=>'<span class="pill-diet">'+d+'</span>').join('')}
      ${r.vibe.slice(0,1).map(v=>'<span class="pill-vibe">'+v+'</span>').join('')}
      ${r.use_case.slice(0,1).map(u=>'<span class="pill-use">'+u+'</span>').join('')}
    </div>
    <div class="explanation">${r.explanation}</div>
    <div class="details">
      <span>📍 ${r.address}</span>
      <span>⏰ ${r.opening_hours}</span>
      <span>📞 ${r.phone}</span>
      <span><a href="${r.website}" target="_blank">🔗 Website</a></span>
    </div>
  `;
  div.onclick=()=>{activeId=r.id; updateMap(); renderCards();};
  return div;
}

function renderCards() {
  const existing=document.querySelectorAll('.restaurant-card');
  existing.forEach((el,i)=>{
    if(lastResults[i]) {
      el.className='restaurant-card'+(lastResults[i].id===activeId?' active':'');
    }
  });
}

function addMessage(type, content) {
  const div=document.createElement('div');
  div.className='message '+type;
  if(type==='user') {
    div.textContent=content;
  } else {
    div.innerHTML=content;
  }
  chatArea.appendChild(div);
  chatArea.scrollTop=chatArea.scrollHeight;
}

function handleSend() {
  const query=chatInput.value.trim();
  if(!query)return;
  chatInput.value='';

  addMessage('user', query);

  const loadingDiv=document.createElement('div');
  loadingDiv.className='message bot';
  loadingDiv.innerHTML='<div class="loading"><div class="loading-dots"><span></span><span></span><span></span></div>Finding what's good in Vienna...</div>';
  chatArea.appendChild(loadingDiv);
  chatArea.scrollTop=chatArea.scrollHeight;

  setTimeout(()=>{
    loadingDiv.remove();
    const {results,filters,total}=processQuery(query,userLocation.lat,userLocation.lon);
    lastResults=results;
    activeId=results[0]?.id||null;

    let html='<div style="margin-bottom:8px;font-weight:700;color:#f8fafc;">Found '+total+' matches — top '+results.length+':</div>';
    results.forEach(r=>{
      html+=createCard(r, r.id===activeId).outerHTML;
    });

    html+='<div class="filter-badges">';
    if(filters.cuisine)html+='<span class="highlight">Cuisine: '+filters.cuisine+'</span>';
    filters.taste_tags.forEach(t=>{html+='<span>Taste: '+t+'</span>';});
    filters.food_type.forEach(ft=>{html+='<span>Food: '+ft+'</span>';});
    filters.diet.forEach(d=>{html+='<span>Diet: '+d+'</span>';});
    filters.vibe.forEach(v=>{html+='<span>Vibe: '+v+'</span>';});
    filters.use_case.forEach(u=>{html+='<span>For: '+u+'</span>';});
    if(filters.max_price)html+='<span>Max: '+filters.max_price+'</span>';
    if(filters.min_price)html+='<span>Min: '+filters.min_price+'</span>';
    html+='</div>';

    addMessage('bot', html);
    updateMap();
  },600);
}

// Init UI
document.getElementById('categoryBar').innerHTML=categories.map(c=>`<button data-filter="${c.filter}">${c.label}</button>`).join('');
document.getElementById('quickFilters').innerHTML=quickQueries.map(q=>`<button>${q.length>28?q.slice(0,28)+'...':q}</button>`).join('');

// Welcome screen
chatArea.innerHTML=`<div class="welcome">
  <h2>👋 Welcome to What's Good Vienna?</h2>
  <p>Ask me anything about restaurants in Vienna. Search by cuisine, taste, vibe, budget, or use case.</p>
  <div class="examples">
    ${quickQueries.slice(0,5).map(q=>`<button><span style="font-size:1.1rem">💬</span> ${q}</button>`).join('')}
  </div>
</div>`;

// Event listeners
sendBtn.onclick=handleSend;
chatInput.onkeypress=e=>{if(e.key==='Enter')handleSend();};

document.getElementById('categoryBar').onclick=e=>{
  if(e.target.tagName==='BUTTON'){
    const filter=e.target.dataset.filter;
    const q=filter==='spicy'?'spicy food near me':
            filter==='vegetarian'?'vegetarian restaurant':
            filter==='cafe'?'cozy cafe with wifi':
            filter==='noodles'?'noodle soup restaurant':
            filter==='curry'?'curry restaurant':
            filter==='sweet'?'sweet dessert place':
            filter==='late-night'?'late night food open now':
            filter==='date'?'romantic restaurant for date':
            filter==='cheap eats'?'cheap food under €15':
            'quiet study cafe with wifi';
    chatInput.value=q;
    e.target.classList.toggle('on');
  }
};

document.getElementById('quickFilters').onclick=e=>{
  if(e.target.tagName==='BUTTON')chatInput.value=e.target.textContent;
};

chatArea.onclick=e=>{
  const btn=e.target.closest('button');
  if(btn&&btn.parentElement.classList.contains('examples')){
    chatInput.value=btn.textContent.replace('💬 ','');
  }
};

// Init map when Leaflet loads
window.onload=initMap;
</script>
</body>
</html>
